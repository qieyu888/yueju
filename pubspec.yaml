name: yueplayer
description: "久遇 — 场景化线下聚会与轻社交"
publish_to: 'none'

version: 1.0.2+4

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  in_app_purchase: ^3.2.3
  # 与 in_app_purchase 锁定的 storekit 版本一致；用于在 main 中先于 IAP 启用 StoreKit 1 回退。
  in_app_purchase_storekit: ^0.4.8
  app_tracking_transparency: ^2.0.6+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
